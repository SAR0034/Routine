<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#08090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Soafa">
    <title>Soafa Routine</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: 'var(--bg)', bg2: 'var(--bg2)',
                        card: 'var(--card)', 'card-hover': 'var(--card-hover)',
                        border: 'var(--border)', border2: 'var(--border2)',
                        silver: { 100: 'var(--silver-100)', 200: 'var(--silver-200)', 300: 'var(--silver-300)', 400: 'var(--silver-400)', 500: 'var(--silver-500)' },
                        cat: { morning: 'var(--cat-morning)', study: 'var(--cat-study)', food: 'var(--cat-food)', activity: 'var(--cat-activity)', wind: 'var(--cat-wind)', sleep: 'var(--cat-sleep)' }
                    },
                    fontFamily: {
                        bebas: ['"Bebas Neue"', 'sans-serif'],
                        syne: ['Syne', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    letterSpacing: { widest: '0.1em', uppercase: '0.25em' }
                }
            }
        }
    </script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg: #08090b; --bg2: #0d0f12;
            --card: #131720; --card-hover: #181d26;
            --border: #1e2430; --border2: #262d3a;
            --silver-100: #e8eaed; --silver-200: #c0c8d4;
            --silver-300: #8a95a3; --silver-400: #545e6b; --silver-500: #2e3540;
            --cat-morning: #e07340; --cat-study: #5b7fe8; --cat-food: #3d9e5f;
            --cat-activity: #c94040; --cat-wind: #7a5cc4; --cat-sleep: #3a4455;
        }

        body {
            background-color: var(--bg);
            color: var(--silver-200);
            font-family: 'Syne', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            padding-bottom: 80px; /* Space for bottom nav */
        }

        /* Noise Texture */
        body::after {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 998; opacity: 0.028;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 200px;
        }

        /* Isolated Glitch Effect - Restricted only to Training Area */
        .train-glitch-header {
            animation: localized-train-glitch 1.5s step-end infinite;
        }

        @keyframes localized-train-glitch {
            0%, 95%, 100% { filter: none; transform: none; }
            96% { filter: contrast(1.3) brightness(1.2) saturate(1.4); transform: skewX(-2deg) translate(1px, -1px); }
            98% { filter: contrast(1.5) hue-rotate(10deg); transform: skewX(3deg) translate(-1px, 1px); }
        }

        /* Scanline sweeps */
        .train-scanline-sweep {
            position: absolute; left: 0; right: 0; height: 3px;
            background: linear-gradient(to bottom, transparent, rgba(192,200,212,0.4), transparent);
            box-shadow: 0 0 10px rgba(192,200,212,0.6);
            pointer-events: none;
            animation: sweep-down 4s linear infinite;
        }

        @keyframes sweep-down {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        /* Metallic Card */
        .card {
            background: linear-gradient(160deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.01) 40%, rgba(0,0,0,0.1) 100%), #131720;
            border: 1px solid var(--border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), inset 0 -1px 0 rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.4);
            border-radius: 6px;
            transition: border-color 0.25s ease, background-color 0.25s ease, transform 0.2s ease;
        }
        .card:hover { background-color: var(--card-hover); }

        /* Active Task Glow */
        .task-active {
            transform: scale(1.025);
            border-color: rgba(192,200,212,0.5) !important;
            box-shadow: 0 0 0 1px rgba(192,200,212,0.2), 0 0 20px rgba(192,200,212,0.12), 0 0 40px rgba(192,200,212,0.05), inset 0 0 12px rgba(192,200,212,0.04);
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(192,200,212,0.12), inset 0 0 12px rgba(192,200,212,0.04); }
            50% { box-shadow: 0 0 32px rgba(192,200,212,0.22), inset 0 0 18px rgba(192,200,212,0.08); }
        }

        /* Custom Checkbox */
        .custom-checkbox {
            width: 18px; height: 18px;
            border: 1px solid var(--silver-400); border-radius: 4px; background: transparent;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .custom-checkbox.checked {
            background: var(--silver-200); border-color: var(--silver-100);
            transform: scale(1.15); animation: check-ripple 0.4s ease-out;
        }
        .custom-checkbox.checked::after {
            content: '✓'; color: #08090b; font-size: 11px; font-weight: 900; font-family: sans-serif;
        }
        @keyframes check-ripple {
            0% { box-shadow: 0 0 0 0px rgba(192,200,212,0.5); }
            100% { box-shadow: 0 0 0 8px rgba(192,200,212,0); }
        }

        /* Brand Gradient Text */
        .brand-gradient {
            background: linear-gradient(135deg, #d0d5de 0%, #7a8494 50%, #c4cad4 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Toggle Switch */
        .toggle-switch {
            width: 32px; height: 18px; border-radius: 9px; cursor: pointer; position: relative; transition: background-color 0.2s;
        }
        .toggle-knob {
            width: 14px; height: 14px; border-radius: 50%; background: white;
            position: absolute; top: 2px; left: 2px; transition: transform 0.2s;
        }
        .toggle-switch.on { background-color: var(--silver-300); }
        .toggle-switch.off { background-color: var(--border2); }
        .toggle-switch.on .toggle-knob { transform: translateX(14px); }

        /* General Utilities */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animations */
        @keyframes slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up { animation: slide-up 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Input overrides */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
        input[type="time"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // --- ICONS ---
        const Icons = {
            Download: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Pencil: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>,
            Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            ArrowLeft: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            ArrowRight: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
            Dumbbell: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m14.5 9.5-5 5"/><path d="m9.2 11.2-1.4 1.4-1.4-1.4a2 2 0 0 0-2.8 0l-.7.7a2 2 0 0 0 0 2.8l2.8 2.8a2 2 0 0 0 2.8 0l.7-.7a2 2 0 0 0 0-2.8l-1.4-1.4 1.4-1.4"/><path d="m14.8 12.8 1.4-1.4 1.4 1.4a2 2 0 0 0 2.8 0l.7-.7a2 2 0 0 0 0-2.8l-2.8-2.8a2 2 0 0 0-2.8 0l-.7.7a2 2 0 0 0 0 2.8l1.4 1.4-1.4 1.4"/></svg>,
            Trash: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Plus: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Battery: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="16" height="10" rx="2" ry="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>
        };

        // --- CONSTANTS & DEFAULT DATA ---
        const DEFAULT_TASKS = [
            { id: "dt_01", title: "Wake up between 5:00–5:30 AM", emoji: "🌅", category: "morning", tip: "Consistency in wake time regulates your circadian rhythm.", measurable: true, type: "time-target", targetWindowStart: "05:00", targetWindowEnd: "05:30", hardCutoff: "07:30", floorPercent: 1, unit: "wake time" },
            { id: "dt_02", emoji: "💧", title: "Drink 500ml of water", category: "morning", tip: "Hydration after sleep reactivates metabolism and focus.", measurable: false },
            { id: "dt_03", emoji: "🦷", title: "Brush teeth", category: "morning", tip: "Non-negotiable. Takes 2 minutes. No excuses.", measurable: false },
            { id: "dt_04", emoji: "🚿", title: "Shower and get fresh", category: "morning", tip: "Cold or contrast shower improves alertness significantly.", measurable: false },
            { id: "dt_05", emoji: "🏋️", title: "Workout (1 to 1.5 hours)", category: "activity", tip: "Push/Pull/Legs split. Use Workout Tab.", measurable: true, target: 1.5, unit: "hrs", inverse: false },
            { id: "dt_06", emoji: "📚", title: "Study for at least 4 hours (SSC)", category: "study", tip: "4 focused hours beats 8 distracted ones. Deep work only.", measurable: true, target: 4, unit: "hrs", inverse: false },
            { id: "dt_07", emoji: "👟", title: "Get at least 10,000 steps", category: "morning", tip: "Steps throughout the day. Football counts. Walk between blocks.", measurable: true, target: 10000, unit: "steps", inverse: false },
            { id: "dt_08", emoji: "🌙", title: "Wind down by 9:30 PM", category: "wind", tip: "Wind down signals your nervous system to prepare for sleep.", measurable: false },
            { id: "dt_09", emoji: "💤", title: "Get at least 8 hours of sleep", category: "sleep", tip: "Sleep is where muscle grows and memory consolidates.", measurable: true, target: 8, unit: "hrs", inverse: false },
            { id: "dt_10", emoji: "📵", title: "No screens after 9:00 PM", category: "wind", tip: "Blue light post 9PM destroys sleep quality. Non-negotiable.", measurable: false },
            { id: "dt_11", emoji: "📱", title: "Keep total screen time under 2 hours", category: "wind", tip: "2 hours max. Track it. Phone has screen time settings.", measurable: true, target: 2, unit: "hrs", inverse: true }
        ];

        const DEFAULT_HABITS = [
            "No Screen/Phone in Bed First 30 Min",
            "No Fast-food Consumption Today",
            "No Unscheduled Video Bingeing",
            "No Skipping Water Protocols"
        ];

        const DEFAULT_WORKOUT_CONFIG = {
            schedule: { 1: "push", 2: "pull", 3: "legs", 4: "rest", 5: "push", 6: "pull", 0: "rest" },
            workouts: {
                push: {
                    name: "PUSH DAY", muscles: "Chest · Shoulders · Triceps",
                    exercises: [
                        { name: 'Push-Ups', sets: '4', reps: '12–15', tip: 'Slow eccentric, elbows 45°' },
                        { name: 'Pike Push-Ups', sets: '3', reps: '10', tip: 'Hips high, load on shoulders' },
                        { name: 'Tricep Dips', sets: '3', reps: '12', tip: 'Vertical torso, elbows back' },
                        { name: 'Lateral Raises', sets: '3', reps: '12', tip: 'Lean slightly forward, lead with elbows' },
                        { name: 'Plank Hold', sets: '3', reps: '45s', tip: 'Brace core, squeeze glutes, don\'t sag' }
                    ]
                },
                pull: {
                    name: "PULL DAY", muscles: "Back · Biceps · Rear Delts",
                    exercises: [
                        { name: 'Pull-Ups / Aussie Rows', sets: '4', reps: '8–10', tip: 'Chest high, lats first, squeeze back' },
                        { name: 'Band Rows', sets: '3', reps: '12', tip: 'Slow release, pull into lower ribs' },
                        { name: 'Bicep Curls', sets: '3', reps: '12', tip: 'Supinate wrist, no hip swing' },
                        { name: 'Face Pulls', sets: '3', reps: '15', tip: 'Pull to ears, high elbows, rear delts' },
                        { name: 'Dead Hangs', sets: '3', reps: '30s', tip: 'Passive hang, deep grip, spine opens' }
                    ]
                },
                legs: {
                    name: "LEGS & CORE", muscles: "Quads · Glutes · Hamstrings · Core",
                    exercises: [
                        { name: 'Squats', sets: '4', reps: '15', tip: 'Midfoot drive, below parallel' },
                        { name: 'Lunges', sets: '3', reps: '12 each', tip: 'Knee tracks over second toe' },
                        { name: 'Glute Bridges', sets: '3', reps: '15', tip: 'Squeeze at top, hold 1 second' },
                        { name: 'Calf Raises', sets: '4', reps: '20', tip: 'Full stretch at bottom, explode up' },
                        { name: 'Leg Raises', sets: '3', reps: '12', tip: 'Lower ab contraction, no spine arch' },
                        { name: 'Bicycle Crunches', sets: '3', reps: '20', tip: 'Shoulder blades up, full rotation' }
                    ]
                },
                rest: { name: "REST DAY", muscles: "Active Recovery", exercises: [] }
            }
        };

        // --- UTILS ---
        const formatDateKey = (date) => {
            const d = new Date(date);
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().split('T')[0];
        };
        const getToday = () => {
            const d = new Date();
            d.setHours(0,0,0,0);
            return d;
        };
        const formatDisplayDate = (date) => {
            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            return `${days[date.getDay()]} ${String(date.getDate()).padStart(2, '0')} ${months[date.getMonth()]}`;
        };
        const getCategoryColor = (cat) => `var(--cat-${cat})`;

        // --- CALCULATIONS ---
        const getWakeUpProgress = (wakeTimeStr) => {
            if (!wakeTimeStr || wakeTimeStr === "--:--") return 0;
            const toMins = (str) => {
                const [h, m] = str.split(":").map(Number);
                return h * 60 + (m || 0);
            };
            const actual = toMins(wakeTimeStr);

            const T_400  = 240;  // 4:00 AM
            const T_430  = 270;  // 4:30 AM
            const T_530  = 330;  // 5:30 AM
            const T_730  = 450;  // 7:30 AM

            // Zone 1: before 4:00 AM → 50% hard floor
            if (actual < T_400) return 50;
            
            // Zone 2: 4:00–4:30 → 50% to 100%
            if (actual < T_430) {
                return Math.round(50 + ((actual - T_400) / (T_430 - T_400)) * 50);
            }

            // Zone 3: 4:30–5:30 → 100%
            if (actual <= T_530) return 100;

            // Zone 4: 5:30–7:30 → 100% down to 1%
            if (actual < T_730) {
                return Math.round(100 - ((actual - T_530) / (T_730 - T_530)) * 99);
            }

            // Zone 5: 7:30 AM or later → 1%
            return 1;
        };

        const getWakeUpLabel = (progress, actual) => {
            const T_400 = 240;
            const T_430 = 270;
            const T_530 = 330;

            if (actual < T_400)  return { text: "// TOO EARLY",      color: "#c94040" };
            if (actual < T_430)  return { text: "// EARLY",          color: "#8a95a3" };
            if (actual <= T_530) return { text: "// ON TIME",        color: "#8a95a3" };
            if (progress >= 80)  return { text: "// SLIGHTLY LATE",  color: "#8a95a3" };
            if (progress >= 50)  return { text: "// LATE",           color: "#8a95a3" };
            if (progress > 1)    return { text: "// VERY LATE",      color: "#8a95a3" };
            return               { text: "// WAY OFF TARGET",        color: "#c94040" };
        };

        const calcDayProgress = (configTasks, cTasks, state) => {
            const allTasks = [...configTasks, ...cTasks];
            if(allTasks.length === 0) return 0;
            let sum = 0;
            allTasks.forEach(t => {
                if(t.measurable) {
                    const actual = state.task_values?.[t.id];
                    if (t.type === 'time-target') {
                        sum += getWakeUpProgress(actual) / 100;
                    } else {
                        const actualNum = actual || 0;
                        if(t.inverse) {
                            sum += actualNum > t.target ? 0 : Math.max((t.target - actualNum) / t.target, 0);
                        } else {
                            sum += Math.min(actualNum / t.target, 1.0);
                        }
                    }
                } else {
                    if(state.completed_tasks?.includes(t.id)) sum += 1.0;
                }
            });
            return Math.round((sum / allTasks.length) * 100);
        };

        // --- CUSTOM HOOKS (LocalStorage) ---
        function useStickyState(defaultValue, key) {
            const [value, setValue] = useState(() => {
                const stickyValue = window.localStorage.getItem(key);
                return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
            });
            useEffect(() => {
                window.localStorage.setItem(key, JSON.stringify(value));
            }, [key, value]);
            return [value, setValue];
        }

        // --- COMPONENTS ---
        const Checkbox = ({ checked, onClick }) => (
            <div className={`custom-checkbox ${checked ? 'checked' : ''}`} onClick={(e) => { e.stopPropagation(); onClick(); }}></div>
        );

        const Toggle = ({ on, onChange }) => (
            <div className={`toggle-switch ${on ? 'on' : 'off'}`} onClick={onChange}>
                <div className="toggle-knob"></div>
            </div>
        );

        const App = () => {
            const todayDate = getToday();
            const todayKey = formatDateKey(todayDate);
            
            const [currentTab, setCurrentTab] = useState('ROUTINE'); // ROUTINE, WORKOUT, STATS
            const [viewDate, setViewDate] = useState(todayDate);
            const viewKey = formatDateKey(viewDate);
            const isToday = viewKey === todayKey;
            const isTomorrow = viewDate > todayDate;

            // App State
            const [config, setConfig] = useStickyState({ tasks: DEFAULT_TASKS, bad_habits: DEFAULT_HABITS }, 'soafa-routine-v3_config');
            const [workoutConfig, setWorkoutConfig] = useStickyState(DEFAULT_WORKOUT_CONFIG, 'soafa_workout_config');
            const [customTasks, setCustomTasks] = useStickyState([], 'soafa_custom_tasks');
            const [dailyStates, setDailyStates] = useState({});
            const [bestStreak, setBestStreak] = useStickyState(0, 'soafa-routine-v3_best_streak');

            const [isAddSheetOpen, setIsAddSheetOpen] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [showInstall, setShowInstall] = useState(false);
            const [showCelebration, setShowCelebration] = useState(false);

            // Clock Update
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 60000);
                return () => clearInterval(timer);
            }, []);

            // PWA Logic
            useEffect(() => {
                const handleBeforeInstall = (e) => { e.preventDefault(); setDeferredPrompt(e); setShowInstall(true); };
                window.addEventListener('beforeinstallprompt', handleBeforeInstall);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstall);
            }, []);

            const handleInstall = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                setDeferredPrompt(null);
                setShowInstall(false);
            };

            // Daily State Management
            const getDailyState = (dateKey) => {
                if (dailyStates[dateKey]) return dailyStates[dateKey];
                const saved = window.localStorage.getItem(`soafa-routine-v3_state_${dateKey}`);
                return saved ? JSON.parse(saved) : { completed_tasks: [], avoided_habits: [], workout_completed: false, workout_checks: [], celebrated: false, task_values: {} };
            };

            const updateDailyState = (dateKey, updates) => {
                const newState = { ...getDailyState(dateKey), ...updates };
                setDailyStates(prev => ({ ...prev, [dateKey]: newState }));
                window.localStorage.setItem(`soafa-routine-v3_state_${dateKey}`, JSON.stringify(newState));
                return newState;
            };

            const viewState = getDailyState(viewKey);

            // Streak & Stats Calculation
            const calcStats = useMemo(() => {
                let currentStreak = 0;
                let iterDate = new Date(todayDate);
                let history = [];

                for (let i = 0; i < 7; i++) {
                    const key = formatDateKey(iterDate);
                    const state = getDailyState(key);
                    const dayCustomTasks = customTasks.filter(ct => ct.createdDate <= key && (!ct.deadline || ct.deadlineDate >= key || state.completed_tasks.includes(ct.id)));
                    const pct = calcDayProgress(config.tasks, dayCustomTasks, state);
                    
                    history.unshift({ day: iterDate.getDay(), pct, key });

                    if (i === 0) {
                        iterDate.setDate(iterDate.getDate() - 1);
                        continue;
                    }

                    if (pct >= 80) currentStreak++;
                    else break;

                    iterDate.setDate(iterDate.getDate() - 1);
                }

                if (currentStreak > bestStreak) setBestStreak(currentStreak);

                const todayCustom = customTasks.filter(ct => ct.createdDate <= todayKey && (!ct.deadline || ct.deadlineDate >= todayKey || viewState.completed_tasks.includes(ct.id)));
                const todayPct = calcDayProgress(config.tasks, todayCustom, getDailyState(todayKey));

                const d = new Date(todayDate);
                const day = d.getDay();
                const diff = d.getDate() - day + (day === 0 ? -6:1);
                const monday = new Date(d.setDate(diff));
                let workoutsThisWeek = 0;
                for(let i=0; i<7; i++) {
                    const k = formatDateKey(new Date(monday.getTime() + i*86400000));
                    if(getDailyState(k).workout_completed) workoutsThisWeek++;
                    if(k === todayKey) break;
                }

                return { currentStreak, history, todayPct, workoutsThisWeek };
            }, [todayDate, dailyStates, customTasks, config, bestStreak]);

            const todayViewCustom = customTasks.filter(ct => ct.createdDate <= viewKey && (!ct.deadline || ct.deadlineDate >= viewKey || viewState.completed_tasks.includes(ct.id)));
            const progressPct = calcDayProgress(config.tasks, todayViewCustom, viewState);
            const viewTotalTasks = config.tasks.length + todayViewCustom.length;

            useEffect(() => {
                if (progressPct >= 100 && viewTotalTasks > 0 && !viewState.celebrated) {
                    setShowCelebration(true);
                    updateDailyState(viewKey, { celebrated: true });
                    setTimeout(() => setShowCelebration(false), 4000);
                }
            }, [progressPct, viewTotalTasks, viewState.celebrated, viewKey]);

            // Navigation
            const navDay = (delta) => {
                const newDate = new Date(viewDate);
                newDate.setDate(newDate.getDate() + delta);
                setViewDate(newDate);
            };

            const toggleTask = (id) => {
                const isCompleted = viewState.completed_tasks.includes(id);
                const newCompleted = isCompleted 
                    ? viewState.completed_tasks.filter(tid => tid !== id)
                    : [...viewState.completed_tasks, id];
                updateDailyState(viewKey, { completed_tasks: newCompleted, celebrated: false });
            };

            const setTaskValue = (id, val) => {
                const currentVals = viewState.task_values || {};
                updateDailyState(viewKey, { task_values: { ...currentVals, [id]: val }, celebrated: false });
            };

            const addCustomTask = (task) => {
                const newTask = {
                    ...task, id: `ct_${Date.now()}`, createdDate: viewKey, deadlineDate: task.deadline ? viewKey : null, measurable: false
                };
                setCustomTasks(prev => [...prev, newTask]);
                setIsAddSheetOpen(false);
            };

            const deleteCustomTask = (id) => {
                setCustomTasks(prev => prev.filter(t => t.id !== id));
                updateDailyState(viewKey, { completed_tasks: viewState.completed_tasks.filter(tid => tid !== id) });
            };

            return (
                <div className="min-h-screen relative max-w-md mx-auto bg-bg border-x border-border shadow-2xl">
                    {/* Header - Glassmorphism */}
                    <header className="sticky top-0 z-40 bg-[rgba(8,9,11,0.45)] backdrop-blur-[24px] border-b border-[rgba(255,255,255,0.06)] px-4 py-3">
                        <div className="flex justify-between items-center mb-2">
                            <div className="flex items-center">
                                <h1 className="font-bebas text-3xl brand-gradient m-0 leading-none tracking-wider">SOAFA</h1>
                                <span className="ml-2 bg-border2 text-silver-300 border border-border rounded font-mono text-[10px] px-1.5 py-0.5">v3.0</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="text-right leading-tight">
                                    <div className="font-bebas text-xl text-silver-200 tracking-wider">{['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'][viewDate.getDay()]}</div>
                                    <div className="font-mono text-[10px] text-silver-400">{String(viewDate.getDate()).padStart(2,'0')}.{String(viewDate.getMonth()+1).padStart(2,'0')}.{viewDate.getFullYear()}</div>
                                </div>
                                {showInstall && (
                                    <button onClick={handleInstall} className="w-8 h-8 border border-border rounded flex items-center justify-center text-silver-300 hover:bg-border2 hover:text-white transition-colors bg-white/5">
                                        <Icons.Download />
                                    </button>
                                )}
                            </div>
                        </div>

                        {currentTab === 'ROUTINE' && (
                            <div className="mb-2">
                                <div className="flex justify-between items-end mb-1">
                                    <span className="font-mono text-[10px] text-silver-300 tracking-uppercase">// MISSION PROGRESSION</span>
                                    <span className="font-mono text-xs text-silver-200 font-semibold">{progressPct}% SECURED</span>
                                </div>
                                <div className="h-1 bg-border rounded-full overflow-hidden">
                                    <div className="h-full bg-gradient-to-r from-silver-400 to-silver-100 transition-all duration-500 ease-out" style={{ width: `${Math.min(progressPct, 100)}%` }}></div>
                                </div>
                            </div>
                        )}

                        <div className="flex justify-between items-center mb-2">
                            <button onClick={() => navDay(-1)} className="w-8 h-8 border border-border rounded flex items-center justify-center text-silver-300 hover:bg-border2 transition-colors bg-white/5">
                                <Icons.ArrowLeft />
                            </button>
                            <div className="text-center">
                                <div className="font-bebas text-base text-silver-200 tracking-wider">{formatDisplayDate(viewDate)}</div>
                                {!isToday && (
                                    <div className="font-mono text-[9px] mt-0.5 cursor-pointer hover:text-silver-300 transition-colors" onClick={() => setViewDate(todayDate)}>
                                        {isTomorrow ? <span className="text-silver-500">// TOMORROW</span> : (
                                            viewDate < todayDate ? <span className="text-silver-500">// PAST LOG</span> : null
                                        )}
                                        {viewDate.getTime() !== todayDate.getTime() && <span className="text-silver-400 underline block mt-0.5">BACK TO TODAY</span>}
                                    </div>
                                )}
                            </div>
                            <button onClick={() => navDay(1)} disabled={isTomorrow} className={`w-8 h-8 border rounded flex items-center justify-center transition-colors ${isTomorrow ? 'border-border/50 text-silver-500 opacity-40 cursor-not-allowed' : 'border-border text-silver-300 hover:bg-border2 bg-white/5'}`}>
                                <Icons.ArrowRight />
                            </button>
                        </div>
                    </header>

                    {/* Main View Area */}
                    <main className="px-4 py-4 hide-scrollbar">
                        {currentTab === 'ROUTINE' && (
                            <RoutineView 
                                config={config} setConfig={setConfig} customTasks={todayViewCustom} viewState={viewState}
                                toggleTask={toggleTask} setTaskValue={setTaskValue} deleteCustomTask={deleteCustomTask}
                                onAddClick={() => setIsAddSheetOpen(true)}
                            />
                        )}
                        {currentTab === 'WORKOUT' && (
                            <WorkoutView 
                                workoutConfig={workoutConfig} setWorkoutConfig={setWorkoutConfig}
                                viewDate={viewDate} isToday={isToday}
                                getDailyState={getDailyState} updateDailyState={updateDailyState} viewKey={viewKey}
                            />
                        )}
                        {currentTab === 'STATS' && (
                            <StatsView stats={calcStats} config={config} setConfig={setConfig} dailyStates={dailyStates} todayKey={todayKey} />
                        )}
                    </main>

                    {/* Navigation Tabs - 3 Cols */}
                    <nav className="fixed bottom-0 left-0 right-0 z-40 bg-[#08090b]/95 backdrop-blur-xl border-t border-border h-16 grid grid-cols-3 max-w-md mx-auto">
                        <button onClick={() => setCurrentTab('ROUTINE')} className={`flex flex-col items-center justify-center border-r border-border/30 relative ${currentTab === 'ROUTINE' ? 'text-silver-200' : 'text-silver-400'}`}>
                            <span className="font-bebas text-[18px] tracking-wider">ROUTINE</span>
                            <span className="font-mono text-[8px] tracking-widest uppercase mt-0.5">// LOG PROTOCOL</span>
                            <div className={`absolute bottom-2 h-[2px] bg-silver-200 transition-all duration-300 ${currentTab === 'ROUTINE' ? 'w-8' : 'w-0'}`}></div>
                        </button>
                        <button onClick={() => setCurrentTab('WORKOUT')} className={`flex flex-col items-center justify-center border-r border-border/30 relative ${currentTab === 'WORKOUT' ? 'text-silver-200' : 'text-silver-400'}`}>
                            <span className="font-bebas text-[18px] tracking-wider">WORKOUT</span>
                            <span className="font-mono text-[8px] tracking-widest uppercase mt-0.5">// KINETIC ENGINE</span>
                            <div className={`absolute bottom-2 h-[2px] bg-silver-200 transition-all duration-300 ${currentTab === 'WORKOUT' ? 'w-8' : 'w-0'}`}></div>
                        </button>
                        <button onClick={() => setCurrentTab('STATS')} className={`flex flex-col items-center justify-center relative ${currentTab === 'STATS' ? 'text-silver-200' : 'text-silver-400'}`}>
                            <span className="font-bebas text-[18px] tracking-wider">STATS</span>
                            <span className="font-mono text-[8px] tracking-widest uppercase mt-0.5">// METRIC ENGINE</span>
                            <div className={`absolute bottom-2 h-[2px] bg-silver-200 transition-all duration-300 ${currentTab === 'STATS' ? 'w-8' : 'w-0'}`}></div>
                        </button>
                    </nav>

                    {isAddSheetOpen && <QuickAddBar onClose={() => setIsAddSheetOpen(false)} onAdd={addCustomTask} />}
                    
                    {/* Celebration Overlay */}
                    <div className={`fixed inset-0 z-[999] bg-[#08090b]/90 flex flex-col items-center justify-center transition-opacity duration-500 pointer-events-none ${showCelebration ? 'opacity-100' : 'opacity-0'}`}>
                        <div className={`text-center transition-transform duration-500 ${showCelebration ? 'scale-100' : 'scale-75'}`}>
                            <div className="font-mono text-[9px] text-silver-300 tracking-[0.4em] uppercase mb-2">// SEQUENCE ACQUIRED</div>
                            <h2 className="font-bebas text-[80px] text-silver-100 leading-none drop-shadow-[0_0_25px_rgba(232,234,237,0.4)]">DAY COMPLETE</h2>
                        </div>
                    </div>
                </div>
            );
        };

        const RoutineView = ({ config, setConfig, customTasks, viewState, toggleTask, setTaskValue, deleteCustomTask, onAddClick }) => {
            const [isEditMode, setIsEditMode] = useState(false);
            const [localConfig, setLocalConfig] = useState(config.tasks);
            useEffect(() => { setLocalConfig(config.tasks); }, [config.tasks, isEditMode]);

            const handleSave = () => { setConfig(prev => ({...prev, tasks: localConfig})); setIsEditMode(false); };
            const updateLocalTask = (index, field, value) => {
                const newTasks = [...localConfig];
                newTasks[index] = { ...newTasks[index], [field]: value };
                setLocalConfig(newTasks);
            };

            return (
                <div className="pb-8">
                    <div className="flex justify-between items-center border-b border-border pb-2 mb-4">
                        <span className="font-mono text-[9px] text-silver-400 uppercase tracking-uppercase">// DAILY CHECKLIST</span>
                        <div className="flex items-center gap-2">
                            <button onClick={onAddClick} className="w-8 h-8 border border-border rounded flex items-center justify-center text-silver-300 hover:bg-border2 hover:text-white bg-white/5 transition-colors">
                                <Icons.Plus />
                            </button>
                            <button onClick={isEditMode ? handleSave : () => setIsEditMode(true)} className={`w-8 h-8 border rounded flex items-center justify-center transition-colors ${isEditMode ? 'bg-silver-400 text-black border-silver-400' : 'border-border text-silver-300 hover:bg-border2 hover:text-white bg-white/5'}`}>
                                {isEditMode ? <Icons.Check /> : <Icons.Pencil />}
                            </button>
                        </div>
                    </div>

                    <div className="space-y-3">
                        {localConfig.map((task, idx) => {
                            const isChecked = viewState.completed_tasks.includes(task.id);
                            const actualValue = viewState.task_values?.[task.id] || 0;
                            
                            return isEditMode ? (
                                <div key={task.id} className="card border-dashed border-silver-400 p-3 space-y-2">
                                    <div className="grid grid-cols-12 gap-2 items-center">
                                        <input type="text" value={task.emoji} onChange={e => updateLocalTask(idx, 'emoji', e.target.value)} className="col-span-2 text-center bg-bg2 border border-border rounded py-1 font-mono text-sm" />
                                        <input type="text" value={task.title} onChange={e => updateLocalTask(idx, 'title', e.target.value)} className="col-span-7 bg-bg2 border border-border rounded py-1 px-2 font-syne text-[13px] text-silver-200" />
                                        <select value={task.category} onChange={e => updateLocalTask(idx, 'category', e.target.value)} className="col-span-3 bg-bg2 border border-border rounded py-1 px-1 font-mono text-[9px] text-silver-300">
                                            {['morning', 'study', 'food', 'activity', 'wind', 'sleep'].map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <input type="text" value={task.tip} onChange={e => updateLocalTask(idx, 'tip', e.target.value)} placeholder="Tip / description" className="w-full bg-bg2 border border-border rounded py-1 px-2 font-mono text-[10px] text-silver-300" />
                                    {task.measurable && task.type === 'time-target' && (
                                        <div className="grid grid-cols-2 gap-2 mt-2">
                                            <div>
                                                <label className="font-mono text-[9px] text-silver-400 uppercase">Window Start</label>
                                                <input type="time" value={task.targetWindowStart} onChange={e => updateLocalTask(idx, 'targetWindowStart', e.target.value)} className="w-full bg-bg2 border border-border rounded py-1 px-2 font-mono text-[10px] text-silver-200 relative z-10" />
                                            </div>
                                            <div>
                                                <label className="font-mono text-[9px] text-silver-400 uppercase">Window End</label>
                                                <input type="time" value={task.targetWindowEnd} onChange={e => updateLocalTask(idx, 'targetWindowEnd', e.target.value)} className="w-full bg-bg2 border border-border rounded py-1 px-2 font-mono text-[10px] text-silver-200 relative z-10" />
                                            </div>
                                            <div>
                                                <label className="font-mono text-[9px] text-silver-400 uppercase">Hard Cutoff</label>
                                                <input type="time" value={task.hardCutoff} onChange={e => updateLocalTask(idx, 'hardCutoff', e.target.value)} className="w-full bg-bg2 border border-border rounded py-1 px-2 font-mono text-[10px] text-silver-200 relative z-10" />
                                            </div>
                                            <div>
                                                <label className="font-mono text-[9px] text-silver-400 uppercase">Floor %</label>
                                                <input type="number" min="0" max="100" value={task.floorPercent} onChange={e => updateLocalTask(idx, 'floorPercent', parseFloat(e.target.value)||0)} className="w-full bg-bg2 border border-border rounded py-1 px-2 font-mono text-[10px] text-silver-200" />
                                            </div>
                                        </div>
                                    )}
                                    {task.measurable && task.type !== 'time-target' && (
                                        <div className="flex gap-2">
                                            <input type="number" step="any" value={task.target} onChange={e => updateLocalTask(idx, 'target', parseFloat(e.target.value)||0)} placeholder="Target" className="flex-1 bg-bg2 border border-border rounded py-1 px-2 font-mono text-[10px] text-silver-200" />
                                            <input type="text" value={task.unit} onChange={e => updateLocalTask(idx, 'unit', e.target.value)} placeholder="Unit" className="flex-1 bg-bg2 border border-border rounded py-1 px-2 font-mono text-[10px] text-silver-200" />
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <TaskCard 
                                    key={task.id} task={task} checked={isChecked} actualValue={actualValue}
                                    onToggle={() => toggleTask(task.id)} onValueChange={setTaskValue}
                                />
                            );
                        })}
                    </div>

                    {customTasks.length > 0 && (
                        <div className="mt-6">
                            <div className="font-mono text-[9px] text-silver-400 uppercase tracking-uppercase mb-3">// CUSTOM OBJECTIVES</div>
                            <div className="space-y-3">
                                {customTasks.map(task => {
                                    const isChecked = viewState.completed_tasks.includes(task.id);
                                    return (
                                        <div key={task.id} className={`card overflow-hidden ${isChecked ? 'opacity-70' : ''}`} style={{ borderLeft: '2px solid var(--silver-400)'}}>
                                            <div className="p-[11px_14px] flex items-center justify-between gap-2">
                                                <div className="flex items-center gap-3 flex-1 min-w-0">
                                                    <span className="text-base select-none grayscale-[0.1]">{task.emoji}</span>
                                                    <span className={`font-syne font-semibold text-[13px] truncate ${isChecked ? 'line-through opacity-40 text-silver-400' : 'text-silver-200'}`}>{task.title}</span>
                                                </div>
                                                <div className="flex items-center gap-3 shrink-0">
                                                    <button onClick={() => deleteCustomTask(task.id)} className="w-5 h-5 flex items-center justify-center text-silver-500 hover:text-[#c94040] hover:bg-[#c94040]/10 rounded"><Icons.Trash /></button>
                                                    <Checkbox checked={isChecked} onClick={() => toggleTask(task.id)} />
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const TaskCard = ({ task, checked, actualValue, onToggle, onValueChange }) => {
            const [expanded, setExpanded] = useState(false);
            
            let progPct = 0;
            let actualMins = 0;

            if (task.measurable) {
                if (task.type === 'time-target') {
                    progPct = getWakeUpProgress(actualValue);
                    if (actualValue) {
                        const [h, m] = actualValue.split(":").map(Number);
                        actualMins = h * 60 + m;
                    }
                } else {
                    const progressRaw = task.inverse 
                        ? (actualValue > task.target ? 0 : Math.max((task.target - actualValue) / task.target, 0))
                        : Math.min(actualValue / task.target, 1.0);
                    progPct = Math.round(progressRaw * 100);
                }
            }
            
            const isCompleted = task.measurable ? progPct >= 100 : checked;

            // Badges and Progress colors logic
            let badgeColorClass = '';
            let barColorClass = '';
            let statusLabel = '';
            let statusColor = 'text-silver-400';

            if (task.type === 'time-target') {
                if (progPct === 100) { 
                    badgeColorClass = 'text-silver-200 drop-shadow-[0_0_4px_rgba(232,234,237,0.5)]'; 
                    barColorClass = 'bg-silver-100 shadow-[0_0_8px_rgba(232,234,237,0.6)]'; 
                }
                else if (progPct >= 80) { 
                    badgeColorClass = 'text-silver-200'; 
                    barColorClass = 'bg-silver-200'; 
                }
                else if (progPct >= 50) { 
                    // Differentiate between valid 50% (late) and 50% (too early)
                    if (actualMins < 240) {
                        badgeColorClass = 'text-[#c94040]'; 
                        barColorClass = 'bg-[#c94040]'; 
                    } else {
                        badgeColorClass = 'text-silver-300'; 
                        barColorClass = 'bg-silver-300'; 
                    }
                }
                else if (progPct > 1) { 
                    badgeColorClass = 'text-silver-400'; 
                    barColorClass = 'bg-silver-400'; 
                }
                else { 
                    badgeColorClass = 'text-[#c94040]'; 
                    barColorClass = 'bg-[#c94040]'; 
                }

                if (actualValue) {
                    const labelObj = getWakeUpLabel(progPct, actualMins);
                    statusLabel = labelObj.text;
                    statusColor = labelObj.color;
                }
            } else {
                badgeColorClass = progPct >= 100 ? (task.inverse && actualValue > task.target ? 'text-[#c94040]' : 'text-silver-100 drop-shadow-[0_0_4px_rgba(232,234,237,0.5)]') : (progPct >= 80 ? 'text-silver-200' : 'text-silver-400');
                barColorClass = progPct >= 100 ? (task.inverse && actualValue > task.target ? 'bg-[#c94040]' : 'bg-silver-100 shadow-[0_0_8px_rgba(232,234,237,0.6)]') : (progPct >= 80 ? 'bg-silver-200' : 'bg-silver-400');
            }

            return (
                <div className={`card overflow-hidden ${isCompleted ? 'opacity-70' : ''} ${!isCompleted && expanded ? 'task-active' : ''}`} style={{ borderLeft: `3px solid ${getCategoryColor(task.category)}`}}>
                    <div className="p-[11px_14px] flex flex-col cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center justify-between gap-2">
                            <div className="flex items-center gap-3 flex-1 min-w-0">
                                <span className="text-base select-none grayscale-[0.1]">{task.emoji}</span>
                                <span className={`font-syne font-semibold text-[13px] tracking-wide truncate ${isCompleted ? 'line-through opacity-40 text-silver-400' : 'text-silver-200'}`}>{task.title}</span>
                            </div>
                            
                            {task.measurable ? (
                                <div className="flex items-center gap-2 shrink-0" onClick={e => e.stopPropagation()}>
                                    {task.type === 'time-target' ? (
                                        <div className="relative">
                                            <input 
                                                type="time" 
                                                value={actualValue || ''}
                                                onChange={e => onValueChange(task.id, e.target.value)}
                                                className="w-[72px] bg-bg2 border border-border2 rounded-[4px] font-mono text-[13px] text-silver-100 text-center py-1 outline-none focus:border-silver-300 transition-colors relative z-10"
                                            />
                                        </div>
                                    ) : (
                                        <input 
                                            type="number" min="0" step="any" placeholder="0"
                                            value={actualValue || ''}
                                            onChange={e => onValueChange(task.id, parseFloat(e.target.value) || 0)}
                                            className="w-[52px] bg-bg2 border border-border2 rounded-[4px] font-mono text-[13px] text-silver-100 text-center py-1 outline-none focus:border-silver-300 transition-colors"
                                        />
                                    )}
                                    {task.type !== 'time-target' && <span className="font-mono text-[9px] text-silver-400 min-w-[24px]">{task.unit}</span>}
                                    
                                    <span className={`font-mono text-[10px] w-8 text-right ${badgeColorClass}`}>
                                        {progPct}% {task.type === 'time-target' && progPct === task.floorPercent && progPct < 50 ? '⚠' : ''}
                                    </span>
                                </div>
                            ) : (
                                <div className="flex items-center gap-3 shrink-0" onClick={e => e.stopPropagation()}>
                                    <Checkbox checked={checked} onClick={onToggle} />
                                </div>
                            )}
                        </div>
                        
                        {task.measurable && (
                            <div className="mt-2">
                                <div className="h-[2px] w-full bg-border rounded-full overflow-hidden">
                                    <div className={`h-full transition-all duration-400 ease-out ${barColorClass}`} style={{ width: `${Math.min(progPct, 100)}%`}}></div>
                                </div>
                                {task.type === 'time-target' && statusLabel && (
                                    <div className="font-mono text-[9px] mt-1" style={{ color: statusColor }}>
                                        {statusLabel}
                                    </div>
                                )}
                            </div>
                        )}

                        {expanded && (
                            <div className="border-t border-border2/50 mt-2 pt-2 flex justify-between items-end" onClick={e => e.stopPropagation()}>
                                <p className="font-mono text-[9px] text-silver-400 italic flex-1 pr-4">// TIP: {task.tip}</p>
                                <span className="font-mono text-[8px] bg-border2 text-silver-400 px-1.5 py-0.5 rounded uppercase shrink-0">CAT: {task.category}</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const WorkoutView = ({ workoutConfig, setWorkoutConfig, viewDate, isToday, getDailyState, updateDailyState, viewKey }) => {
            const [isEditMode, setIsEditMode] = useState(false);
            const [localConfig, setLocalConfig] = useState(workoutConfig);
            
            const daysMap = [
                { name: 'MON', idx: 1 }, { name: 'TUE', idx: 2 }, { name: 'WED', idx: 3 },
                { name: 'THU', idx: 4 }, { name: 'FRI', idx: 5 }, { name: 'SAT', idx: 6 }, { name: 'SUN', idx: 0 }
            ];
            
            const [viewDayIdx, setViewDayIdx] = useState(viewDate.getDay());
            
            useEffect(() => { setLocalConfig(workoutConfig); }, [workoutConfig, isEditMode]);

            const handleSave = () => { setWorkoutConfig(localConfig); setIsEditMode(false); };
            
            const selectedWorkoutId = localConfig.schedule[viewDayIdx];
            const workout = localConfig.workouts[selectedWorkoutId];
            const isRest = workout?.exercises?.length === 0;

            const state = getDailyState(viewKey);
            const checks = state.workout_checks || [];
            
            const viewingRealToday = viewDayIdx === getToday().getDay() && isToday;

            const toggleCheck = (name) => {
                if(!viewingRealToday) return;
                const newChecks = checks.includes(name) ? checks.filter(c => c !== name) : [...checks, name];
                updateDailyState(viewKey, { workout_checks: newChecks });
            };

            const completeWorkout = () => {
                if(!viewingRealToday) return;
                const dt_05 = DEFAULT_TASKS.find(t=>t.id==='dt_05');
                const currentVals = state.task_values || {};
                
                updateDailyState(viewKey, { 
                    workout_completed: true, 
                    workout_checks: checks,
                    task_values: { ...currentVals, 'dt_05': dt_05 ? dt_05.target : 1.5 }
                });
            };

            // Edit Handlers
            const setDaySchedule = (dayIdx, val) => setLocalConfig(p => ({...p, schedule: {...p.schedule, [dayIdx]: val}}));
            const setWorkoutDetail = (field, val) => setLocalConfig(p => ({...p, workouts: {...p.workouts, [selectedWorkoutId]: {...p.workouts[selectedWorkoutId], [field]: val}}}));
            const updateExercise = (eIdx, field, val) => {
                const exList = [...workout.exercises];
                exList[eIdx] = {...exList[eIdx], [field]: val};
                setWorkoutDetail('exercises', exList);
            };
            const addExercise = () => setWorkoutDetail('exercises', [...(workout.exercises||[]), {name:'New Exercise', sets:'3', reps:'10', tip:''}]);
            const delExercise = (eIdx) => {
                const exList = [...workout.exercises];
                exList.splice(eIdx, 1);
                setWorkoutDetail('exercises', exList);
            };
            const addCustomDay = () => {
                const newId = `custom_${Date.now()}`;
                setLocalConfig(p => ({
                    ...p, 
                    workouts: {...p.workouts, [newId]: { name: "NEW DAY", muscles: "Muscles", exercises: [] }},
                    schedule: {...p.schedule, [viewDayIdx]: newId}
                }));
            };

            return (
                <div className="pb-24">
                    <div className="flex justify-between items-center border-b border-border pb-2 mb-4">
                        <span className="font-mono text-[9px] text-silver-400 uppercase tracking-[0.25em]">// KINETIC PROTOCOL</span>
                        <button onClick={isEditMode ? handleSave : () => setIsEditMode(true)} className={`w-8 h-8 border rounded flex items-center justify-center transition-colors ${isEditMode ? 'bg-silver-400 text-black border-silver-400' : 'border-border text-silver-300 hover:bg-border2 hover:text-white bg-white/5'}`}>
                            {isEditMode ? <Icons.Check /> : <Icons.Pencil />}
                        </button>
                    </div>

                    {/* Day Schedule Bar */}
                    <div className="flex overflow-x-auto hide-scrollbar gap-2 mb-6 pb-2 border-b border-border/50">
                        {daysMap.map((d) => {
                            const wid = localConfig.schedule[d.idx];
                            const wName = localConfig.workouts[wid]?.name.substring(0,3) || '???';
                            const isSelected = viewDayIdx === d.idx;
                            
                            return isEditMode ? (
                                <div key={d.idx} className="flex flex-col items-center gap-1 min-w-[50px]">
                                    <span className="font-mono text-[10px] text-silver-400">{d.name}</span>
                                    <select value={wid} onChange={(e) => setDaySchedule(d.idx, e.target.value)} className="bg-bg2 border border-border text-[9px] font-mono text-silver-200 p-1 rounded max-w-[60px]">
                                        {Object.keys(localConfig.workouts).map(k => <option key={k} value={k}>{localConfig.workouts[k].name}</option>)}
                                    </select>
                                </div>
                            ) : (
                                <div key={d.idx} onClick={() => setViewDayIdx(d.idx)} className={`flex flex-col items-center justify-center p-2 min-w-[52px] rounded cursor-pointer transition-colors border ${isSelected ? 'bg-[rgba(192,200,212,0.12)] border-silver-300' : 'bg-bg2 border-border'}`}>
                                    <span className={`font-mono text-[10px] uppercase ${isSelected ? 'text-silver-200 font-bold' : 'text-silver-500'}`}>{d.name}</span>
                                    <span className={`font-mono text-[9px] tracking-wider my-0.5 ${isSelected ? 'text-silver-200' : 'text-silver-500'}`}>{wName}</span>
                                </div>
                            );
                        })}
                    </div>

                    {isEditMode && (
                        <button onClick={addCustomDay} className="w-full border border-dashed border-silver-400/50 rounded py-2 mb-6 text-silver-400 font-mono text-[10px] hover:border-silver-300 hover:text-silver-200 transition-colors">
                            + ADD CUSTOM DAY TYPE
                        </button>
                    )}

                    {/* Workout Day View */}
                    <div className="relative">
                        {!isEditMode && <div className="train-scanline-sweep"></div>}
                        
                        {isEditMode ? (
                            <div className="mb-6 space-y-2">
                                <input type="text" value={workout?.name} onChange={e => setWorkoutDetail('name', e.target.value)} className="w-full bg-bg2 border border-border rounded px-3 py-2 font-bebas text-2xl text-silver-100 uppercase" />
                                <input type="text" value={workout?.muscles} onChange={e => setWorkoutDetail('muscles', e.target.value)} className="w-full bg-bg2 border border-border rounded px-3 py-1.5 font-mono text-xs text-silver-300" />
                            </div>
                        ) : (
                            <div className="mb-6">
                                <h2 className="font-bebas text-[28px] text-silver-200 tracking-[0.05em] leading-none uppercase train-glitch-header">{workout?.name}</h2>
                                <p className="font-mono text-[10px] text-silver-400 mt-1">{workout?.muscles}</p>
                            </div>
                        )}

                        {isRest && !isEditMode ? (
                            <div className="flex flex-col items-center justify-center py-12 text-center">
                                <Icons.Battery />
                                <h3 className="font-bebas text-2xl text-silver-400 mt-4 mb-2 uppercase">REST DAY</h3>
                                <p className="font-mono text-[10px] text-silver-400 max-w-[200px] leading-relaxed">Active recovery. No structured resistance training.</p>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {workout?.exercises?.map((ex, i) => {
                                    const isChecked = checks.includes(ex.name);
                                    return isEditMode ? (
                                        <div key={i} className="card p-3 border-dashed border-silver-400 space-y-2">
                                            <div className="grid grid-cols-12 gap-2">
                                                <input type="text" value={ex.name} onChange={e => updateExercise(i, 'name', e.target.value)} placeholder="Exercise Name" className="col-span-8 bg-bg2 border border-border rounded py-1 px-2 font-syne text-[13px] text-silver-100" />
                                                <input type="number" value={ex.sets} onChange={e => updateExercise(i, 'sets', e.target.value)} placeholder="Sets" className="col-span-2 bg-bg2 border border-border rounded py-1 px-1 text-center font-mono text-[10px] text-silver-300" />
                                                <input type="text" value={ex.reps} onChange={e => updateExercise(i, 'reps', e.target.value)} placeholder="Reps" className="col-span-2 bg-bg2 border border-border rounded py-1 px-1 text-center font-mono text-[10px] text-silver-300" />
                                            </div>
                                            <div className="flex gap-2 items-center">
                                                <input type="text" value={ex.tip} onChange={e => updateExercise(i, 'tip', e.target.value)} placeholder="Tip" className="flex-1 bg-bg2 border border-border rounded py-1 px-2 font-mono text-[10px] text-silver-400" />
                                                <button onClick={() => delExercise(i)} className="p-1 text-silver-500 hover:text-[#c94040] bg-bg2 rounded border border-border"><Icons.Trash /></button>
                                            </div>
                                        </div>
                                    ) : (
                                        <ExerciseCard key={i} index={i+1} ex={ex} isChecked={isChecked} onToggle={() => toggleCheck(ex.name)} showCheck={viewingRealToday} />
                                    );
                                })}
                                {isEditMode && (
                                    <button onClick={addExercise} className="w-full border border-dashed border-silver-400/50 rounded py-3 mt-4 text-silver-400 font-mono text-[11px] hover:border-silver-300 hover:text-silver-200 transition-colors">
                                        + ADD EXERCISE
                                    </button>
                                )}
                            </div>
                        )}

                        {!isEditMode && workout?.exercises?.length > 0 && (
                            <div className="mt-6">
                                <div className="flex justify-between font-mono text-[10px] text-silver-400 mb-2">
                                    <span>{viewingRealToday ? checks.length : 0} / {workout.exercises.length} EXERCISES COMPLETE</span>
                                </div>
                                <div className="h-[2px] w-full bg-border rounded-full overflow-hidden">
                                    <div className="h-full bg-silver-200 transition-all duration-400" style={{ width: viewingRealToday ? `${(checks.length/workout.exercises.length)*100}%` : '0%' }}></div>
                                </div>
                            </div>
                        )}

                        {!isEditMode && viewingRealToday && !isRest && (
                            <button onClick={completeWorkout} disabled={state.workout_completed} className={`mt-8 w-full py-4 rounded font-bebas text-xl tracking-wider transition-all ${state.workout_completed ? 'bg-silver-200/20 text-silver-200 opacity-60 pointer-events-none' : 'bg-silver-200 text-[#08090b] hover:bg-white'}`}>
                                {state.workout_completed ? 'SESSION LOGGED ✓' : 'LOG TRAINING'}
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        const ExerciseCard = ({ index, ex, isChecked, onToggle, showCheck }) => {
            const [exp, setExp] = useState(false);
            return (
                <div onClick={() => setExp(!exp)} className={`card p-4 flex flex-col gap-2 transition-all cursor-pointer ${isChecked && showCheck ? 'opacity-40 bg-bg2/40' : ''}`}>
                    <div className="flex items-center justify-between gap-4">
                        <div className="flex items-center gap-4 flex-1 min-w-0">
                            <span className="font-mono text-xs text-silver-400 select-none">{String(index).padStart(2, '0')}</span>
                            <div className="flex flex-col min-w-0">
                                <span className={`font-syne font-semibold text-[13px] ${isChecked && showCheck ? 'line-through text-silver-400' : 'text-silver-100'}`}>{ex.name}</span>
                                <span className="font-mono text-[9px] text-silver-300 mt-0.5">{ex.sets} × {ex.reps}</span>
                            </div>
                        </div>
                        {showCheck && (
                            <div onClick={e => e.stopPropagation()} className="shrink-0">
                                <Checkbox checked={isChecked} onClick={onToggle} />
                            </div>
                        )}
                    </div>
                    {exp && ex.tip && (
                        <div className="border-t border-border2/50 mt-2 pt-2">
                            <p className="font-mono text-[9px] text-silver-400 italic">// TIP: {ex.tip}</p>
                        </div>
                    )}
                </div>
            );
        };

        const StatsView = ({ stats, config, setConfig, dailyStates, todayKey }) => {
            const [habitInput, setHabitInput] = useState('');
            const [localHabits, setLocalHabits] = useState(config.bad_habits);
            useEffect(() => { setLocalHabits(config.bad_habits); }, [config.bad_habits]);

            const todayState = dailyStates[todayKey] || (window.localStorage.getItem(`soafa-routine-v3_state_${todayKey}`) ? JSON.parse(window.localStorage.getItem(`soafa-routine-v3_state_${todayKey}`)) : { avoided_habits: [] });
            const [avoidedToday, setAvoidedToday] = useState(todayState.avoided_habits || []);

            const addHabit = () => {
                if(!habitInput.trim()) return;
                setConfig(prev => ({...prev, bad_habits: [...localHabits, habitInput.trim()]}));
                setHabitInput('');
            };

            const toggleAvoid = (h) => {
                const newAvoided = avoidedToday.includes(h) ? avoidedToday.filter(x => x !== h) : [...avoidedToday, h];
                setAvoidedToday(newAvoided);
                const s = window.localStorage.getItem(`soafa-routine-v3_state_${todayKey}`);
                const state = s ? JSON.parse(s) : { completed_tasks: [], avoided_habits: [], workout_completed: false, task_values: {} };
                state.avoided_habits = newAvoided;
                window.localStorage.setItem(`soafa-routine-v3_state_${todayKey}`, JSON.stringify(state));
            };

            return (
                <div className="pb-8 space-y-6">
                    <div>
                        <div className="font-mono text-[9px] text-silver-400 uppercase tracking-uppercase border-b border-border pb-2 mb-4">// PERFORMANCE MATRIX</div>
                        <div className="card p-5 text-center relative overflow-hidden">
                            <div className="absolute left-1/2 -top-4 w-44 h-44 bg-gradient-to-r from-[rgba(192,200,212,0.06)] to-transparent rounded-full blur-xl -translate-x-1/2 pointer-events-none"></div>
                            <div className="relative z-10">
                                <div className="font-mono text-[10px] text-silver-300 tracking-widest uppercase mb-1">// ACTIVE CONSECUTIVE RUN</div>
                                <div className="font-bebas text-6xl text-silver-200 tracking-wider drop-shadow-md">{stats.currentStreak} DAYS</div>
                                <p className="font-mono text-[10px] text-silver-400 max-w-[280px] mx-auto leading-relaxed mt-2 mb-4">Maintained by completing ≥ 80% of Daily Protocol items daily.</p>
                                <div className="border-t border-border pt-4 grid grid-cols-2 gap-4">
                                    <div>
                                        <div className="font-mono text-[9px] text-silver-400 uppercase">ALL-TIME PEAK</div>
                                        <div className="font-bebas text-2xl text-silver-200">{Math.max(stats.currentStreak, window.localStorage.getItem('soafa-routine-v3_best_streak') || 0)} DAYS</div>
                                    </div>
                                    <div>
                                        <div className="font-mono text-[9px] text-silver-400 uppercase">TODAY'S MARK</div>
                                        <div className="font-bebas text-2xl text-silver-200">{stats.todayPct}%</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="card p-4">
                        <div className="flex justify-between items-center mb-3">
                            <span className="font-mono text-[10px] text-silver-300 uppercase">// COMPLIANCE HISTORY (7D)</span>
                            <span className="font-mono text-[9px] text-silver-400">GOAL: ≥80%</span>
                        </div>
                        <div className="grid grid-cols-7 gap-2">
                            {['S','M','T','W','T','F','S'].map((dayChar, idx) => {
                                const hData = stats.history[idx];
                                if(!hData) return <div key={idx} className="h-12 border border-border rounded opacity-20"></div>;
                                const isCompliant = hData.pct >= 80;
                                return (
                                    <div key={idx} className={`flex flex-col items-center justify-between p-2 rounded border ${isCompliant ? 'bg-silver-500/30 border-silver-300 text-silver-200' : 'bg-bg2 border-border text-silver-400'} ${idx===6 ? 'ring-1 ring-silver-200' : ''}`}>
                                        <span className="font-mono text-[9px] opacity-70">{['S','M','T','W','T','F','S'][new Date(hData.key).getDay()]}</span>
                                        <span className="font-bebas text-xs my-1">{isCompliant ? '✔' : '➖'}</span>
                                        <span className="font-mono text-[8px]">{hData.pct}%</span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div>
                        <div className="font-mono text-[9px] text-silver-400 uppercase tracking-uppercase border-b border-border pb-2 pt-2 mb-4">// PROTOCOL AVOIDANCE TRACKER</div>
                        <div className="card p-4 space-y-4">
                            <div className="flex gap-2">
                                <input type="text" value={habitInput} onChange={e=>setHabitInput(e.target.value)} placeholder="Add targeted code-breaker" className="flex-1 bg-bg2 border border-border rounded px-3 py-2 font-mono text-xs text-silver-200 outline-none focus:border-silver-300" />
                                <button onClick={addHabit} className="bg-silver-300 text-[#08090b] hover:bg-silver-200 font-bebas px-4 rounded text-lg tracking-wider">ADD</button>
                            </div>
                            <div className="flex justify-between font-mono text-[9px] border-b border-border2 pb-2">
                                <span className="text-silver-300">TARGETED FOR AVOIDANCE</span>
                                <span className="text-silver-300">SCORE: {avoidedToday.length}/{localHabits.length} SHIELDED</span>
                            </div>
                            <div className="space-y-2">
                                {localHabits.map((habit, i) => (
                                    <div key={i} className="card p-3 flex items-center gap-3 bg-bg2/50 border-border/50">
                                        <Checkbox checked={avoidedToday.includes(habit)} onClick={() => toggleAvoid(habit)} />
                                        <span className={`font-mono text-xs truncate flex-1 ${avoidedToday.includes(habit) ? 'line-through opacity-40 text-silver-400' : 'text-silver-200'}`}>{habit}</span>
                                        <button onClick={() => setConfig(prev => ({...prev, bad_habits: prev.bad_habits.filter(x => x !== habit)}))} className="text-silver-400 hover:text-[#c94040] hover:bg-[#c94040]/10 p-1.5 rounded transition-colors"><Icons.Trash /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const QuickAddBar = ({ onClose, onAdd }) => {
            const [title, setTitle] = useState('');
            const [emoji, setEmoji] = useState('✅');
            const [showPicker, setShowPicker] = useState(false);
            const inputRef = useRef(null);

            const emojis = ['✅', '📌', '⚡', '🎯', '📞', '💊', '🛒', '📄', '✏️', '🔧', '🏃', '🍎', '💰', '📅'];

            useEffect(() => { 
                inputRef.current?.focus(); 
            }, []);

            const handleAdd = () => {
                if(!title.trim()) return;
                onAdd({ title: title.trim(), emoji });
                setTitle('');
                inputRef.current?.focus();
            };

            return (
                <>
                    <div className="fixed inset-0 z-40" onClick={onClose}></div>
                    <div className="fixed bottom-[64px] left-0 right-0 z-50 bg-[rgba(13,15,18,0.97)] backdrop-blur-[20px] border-t border-border2 px-4 py-[10px] animate-slide-up">
                        {showPicker && (
                            <div className="absolute bottom-[110%] left-4 bg-bg border border-border2 rounded p-2 flex gap-2 overflow-x-auto hide-scrollbar max-w-[calc(100%-32px)] shadow-xl">
                                {emojis.map(e => (
                                    <button key={e} onClick={() => { setEmoji(e); setShowPicker(false); inputRef.current?.focus(); }} className="w-8 h-8 shrink-0 flex items-center justify-center text-lg rounded border border-transparent hover:border-silver-400 bg-bg2 transition-colors">
                                        {e}
                                    </button>
                                ))}
                            </div>
                        )}
                        <div className="flex items-center gap-2 max-w-md mx-auto">
                            <button onClick={() => setShowPicker(!showPicker)} className="w-9 h-9 border border-border2 rounded-[4px] bg-bg2 text-[18px] flex items-center justify-center shrink-0 hover:border-silver-400 transition-colors">
                                {emoji}
                            </button>
                            <input 
                                ref={inputRef} 
                                type="text" 
                                value={title} 
                                onChange={e => setTitle(e.target.value)} 
                                onKeyDown={e => e.key === 'Enter' && handleAdd()}
                                placeholder="Add a task for today..." 
                                className="flex-1 bg-transparent outline-none font-syne text-[13px] text-silver-100 placeholder-silver-500 mx-1 min-w-0" 
                            />
                            <button onClick={handleAdd} disabled={!title.trim()} className="w-[52px] h-9 bg-[rgba(192,200,212,0.12)] border border-border2 rounded-[4px] text-silver-200 font-bebas text-[14px] tracking-[0.1em] flex items-center justify-center shrink-0 disabled:opacity-40 transition-opacity">
                                ADD
                            </button>
                            <button onClick={onClose} className="w-6 h-6 text-silver-400 font-mono text-[14px] flex items-center justify-center shrink-0 hover:text-silver-200 transition-colors">
                                ✕
                            </button>
                        </div>
                    </div>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
